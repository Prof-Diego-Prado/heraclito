<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F4F2ED"/>
      <stop offset="100%" stop-color="#EDE9E0"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle wave lines (watermark style) -->
  <g opacity="0.06" stroke="#4338CA" stroke-width="1.5" fill="none">
    <path d="M0 100 Q150 80 300 100 Q450 120 600 100 Q750 80 900 100 Q1050 120 1200 100"/>
    <path d="M0 160 Q150 140 300 160 Q450 180 600 160 Q750 140 900 160 Q1050 180 1200 160"/>
    <path d="M0 220 Q150 200 300 220 Q450 240 600 220 Q750 200 900 220 Q1050 240 1200 220"/>
    <path d="M0 410 Q150 390 300 410 Q450 430 600 410 Q750 390 900 410 Q1050 430 1200 410"/>
    <path d="M0 470 Q150 450 300 470 Q450 490 600 470 Q750 450 900 470 Q1050 490 1200 470"/>
    <path d="M0 530 Q150 510 300 530 Q450 550 600 530 Q750 510 900 530 Q1050 550 1200 530"/>
  </g>

  <!-- Badge pill -->
  <rect x="480" y="120" width="240" height="40" rx="20" fill="url(#badge)"/>
  <text x="600" y="146" font-family="Georgia, serif" font-size="15" font-weight="600"
        fill="white" text-anchor="middle" letter-spacing="2">ProfEduCatec 2026</text>

  <!-- Η Greek letter (large) -->
  <text x="600" y="340" font-family="Georgia, serif" font-size="180" font-weight="700"
        fill="#4338CA" text-anchor="middle" opacity="0.12">Η</text>

  <!-- Platform name -->
  <text x="600" y="340" font-family="Georgia, serif" font-size="96" font-weight="700"
        fill="#1E1B4B" text-anchor="middle">Heráclito</text>

  <!-- Subtitle -->
  <text x="600" y="400" font-family="Georgia, serif" font-size="26" font-style="italic"
        fill="#4338CA" text-anchor="middle" opacity="0.8">"Πάντα ῥεῖ" — Tudo flui</text>

  <!-- Description -->
  <text x="600" y="460" font-family="system-ui, sans-serif" font-size="20"
        fill="#6B7280" text-anchor="middle">Plataforma educacional · UEM · Materiais, Calendário e Bate-papo</text>

  <!-- Bottom URL bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#4338CA" opacity="0.08"/>
  <text x="600" y="612" font-family="system-ui, sans-serif" font-size="18" font-weight="600"
        fill="#4338CA" text-anchor="middle" opacity="0.7">bit.ly/profeducatec_uem</text>

  <!-- Corner ornaments -->
  <g stroke="#B45309" stroke-width="2" fill="none" opacity="0.3">
    <path d="M40 40 L40 70 M40 40 L70 40"/>
    <path d="M1160 40 L1160 70 M1160 40 L1130 40"/>
    <path d="M40 590 L40 560 M40 590 L70 590"/>
    <path d="M1160 590 L1160 560 M1160 590 L1130 590"/>
  </g>
</svg>
