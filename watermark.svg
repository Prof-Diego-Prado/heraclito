<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">

  <!-- Fundo branco — torna-se transparente com mix-blend-mode: multiply -->
  <rect width="1920" height="1080" fill="white"/>

  <!-- ══════════════════════════════════════════════════════════════
       RIO ETERNO — 21 ondas horizontais suaves (Πάντα ῥεῖ)
  ══════════════════════════════════════════════════════════════ -->
  <g stroke="#0a0a1e" stroke-width="0.65" fill="none" stroke-linecap="round">
    <path d="M0,30  Q240,40  480,30  Q720,20  960,30  Q1200,40  1440,30  Q1680,20  1920,30"/>
    <path d="M0,80  Q240,70  480,80  Q720,90  960,80  Q1200,70  1440,80  Q1680,90  1920,80"/>
    <path d="M0,130 Q240,140 480,130 Q720,120 960,130 Q1200,140 1440,130 Q1680,120 1920,130"/>
    <path d="M0,180 Q240,170 480,180 Q720,190 960,180 Q1200,170 1440,180 Q1680,190 1920,180"/>
    <path d="M0,230 Q240,240 480,230 Q720,220 960,230 Q1200,240 1440,230 Q1680,220 1920,230"/>
    <path d="M0,280 Q240,270 480,280 Q720,290 960,280 Q1200,270 1440,280 Q1680,290 1920,280"/>
    <path d="M0,330 Q240,340 480,330 Q720,320 960,330 Q1200,340 1440,330 Q1680,320 1920,330"/>
    <path d="M0,380 Q240,370 480,380 Q720,390 960,380 Q1200,370 1440,380 Q1680,390 1920,380"/>
    <path d="M0,430 Q240,440 480,430 Q720,420 960,430 Q1200,440 1440,430 Q1680,420 1920,430"/>
    <path d="M0,480 Q240,470 480,480 Q720,490 960,480 Q1200,470 1440,480 Q1680,490 1920,480"/>
    <path d="M0,530 Q240,540 480,530 Q720,520 960,530 Q1200,540 1440,530 Q1680,520 1920,530"/>
    <path d="M0,580 Q240,570 480,580 Q720,590 960,580 Q1200,570 1440,580 Q1680,590 1920,580"/>
    <path d="M0,630 Q240,640 480,630 Q720,620 960,630 Q1200,640 1440,630 Q1680,620 1920,630"/>
    <path d="M0,680 Q240,670 480,680 Q720,690 960,680 Q1200,670 1440,680 Q1680,690 1920,680"/>
    <path d="M0,730 Q240,740 480,730 Q720,720 960,730 Q1200,740 1440,730 Q1680,720 1920,730"/>
    <path d="M0,780 Q240,770 480,780 Q720,790 960,780 Q1200,770 1440,780 Q1680,790 1920,780"/>
    <path d="M0,830 Q240,840 480,830 Q720,820 960,830 Q1200,840 1440,830 Q1680,820 1920,830"/>
    <path d="M0,880 Q240,870 480,880 Q720,890 960,880 Q1200,870 1440,880 Q1680,890 1920,880"/>
    <path d="M0,930 Q240,940 480,930 Q720,920 960,930 Q1200,940 1440,930 Q1680,920 1920,930"/>
    <path d="M0,980 Q240,970 480,980 Q720,990 960,980 Q1200,970 1440,980 Q1680,990 1920,980"/>
    <path d="M0,1030 Q240,1040 480,1030 Q720,1020 960,1030 Q1200,1040 1440,1030 Q1680,1020 1920,1030"/>
  </g>

  <!-- ══════════════════════════════════════════════════════════════
       MEDALHÃO CENTRAL — Heráclito · Chama · Πάντα ῥεῖ
       Centro: (960, 540)
  ══════════════════════════════════════════════════════════════ -->
  <g transform="translate(960,540)" stroke="#0a0a1e" fill="none">

    <!-- Anel externo -->
    <circle r="180" stroke-width="1.4"/>
    <!-- Anel interno (hairline) -->
    <circle r="167" stroke-width="0.4"/>

    <!-- 12 marcações de hora (como mostrador de relógio clássico) -->
    <!-- 12h (topo)  -->  <line x1="0"      y1="-175"   x2="0"      y2="-186"   stroke-width="1.5"/>
    <!-- 1h  -->         <line x1="87.5"   y1="-151.6" x2="92.5"   y2="-160.2" stroke-width="0.9"/>
    <!-- 2h  -->         <line x1="151.6"  y1="-87.5"  x2="160.2"  y2="-92.5"  stroke-width="0.9"/>
    <!-- 3h (direita) --> <line x1="175"    y1="0"      x2="186"    y2="0"      stroke-width="1.5"/>
    <!-- 4h  -->         <line x1="151.6"  y1="87.5"   x2="160.2"  y2="92.5"   stroke-width="0.9"/>
    <!-- 5h  -->         <line x1="87.5"   y1="151.6"  x2="92.5"   y2="160.2"  stroke-width="0.9"/>
    <!-- 6h (base)  -->  <line x1="0"      y1="175"    x2="0"      y2="186"    stroke-width="1.5"/>
    <!-- 7h  -->         <line x1="-87.5"  y1="151.6"  x2="-92.5"  y2="160.2"  stroke-width="0.9"/>
    <!-- 8h  -->         <line x1="-151.6" y1="87.5"   x2="-160.2" y2="92.5"   stroke-width="0.9"/>
    <!-- 9h (esquerda) --><line x1="-175"   y1="0"      x2="-186"   y2="0"      stroke-width="1.5"/>
    <!-- 10h -->          <line x1="-151.6" y1="-87.5"  x2="-160.2" y2="-92.5"  stroke-width="0.9"/>
    <!-- 11h -->          <line x1="-87.5"  y1="-151.6" x2="-92.5"  y2="-160.2" stroke-width="0.9"/>

    <!-- Diamantes ornamentais nos pontos cardeais do anel interno -->
    <path d="M0,-153   L5,-147   L0,-141   L-5,-147  Z" stroke-width="0.7"/>
    <path d="M153,0    L147,5    L141,0    L147,-5   Z" stroke-width="0.7"/>
    <path d="M0,153    L5,147    L0,141    L-5,147   Z" stroke-width="0.7"/>
    <path d="M-153,0   L-147,5   L-141,0   L-147,-5  Z" stroke-width="0.7"/>

    <!-- ── CHAMA DUPLA ── símbolo do fogo primordial de Heráclito ── -->

    <!-- Chama exterior — contorno principal -->
    <path d="M0,-118
             C -32,-86 -48,-44 -42,-4
             C -36,34  -16,66   0, 84
             C  16,66   36,34  42, -4
             C  48,-44  32,-86  0,-118 Z"
          stroke-width="1.3"/>

    <!-- Chama interior — detalhe interior (alma da chama) -->
    <path d="M0,-76
             C -18,-54 -26,-28 -22,2
             C -18,28  -8,50   0,63
             C   8,50  18,28  22,2
             C  26,-28 18,-54  0,-76 Z"
          stroke-width="0.75"/>

    <!-- Regras decorativas flanqueando o texto -->
    <line x1="-68" y1="127" x2="-30" y2="127" stroke-width="0.65"/>
    <line x1=" 30" y1="127" x2=" 68" y2="127" stroke-width="0.65"/>

    <!-- Πάντα ῥεῖ — entre a chama e o anel interno -->
    <text y="136"
          text-anchor="middle"
          font-family="'Palatino Linotype','Book Antiqua',Palatino,'EB Garamond',Georgia,serif"
          font-size="16"
          letter-spacing="5"
          fill="#0a0a1e"
          stroke="none">Πάντα ῥεῖ</text>

  </g>

  <!-- ══════════════════════════════════════════════════════════════
       ORNAMENTOS DE CANTO — moldura discreta
  ══════════════════════════════════════════════════════════════ -->
  <g stroke="#0a0a1e" stroke-width="1.2" stroke-linecap="square">
    <!-- Superior esquerdo -->
    <path fill="none" d="M45,130 L45,45 L130,45"/>
    <rect fill="#0a0a1e" x="41" y="41" width="8" height="8"/>
    <!-- Superior direito -->
    <path fill="none" d="M1875,130 L1875,45 L1790,45"/>
    <rect fill="#0a0a1e" x="1871" y="41" width="8" height="8"/>
    <!-- Inferior esquerdo -->
    <path fill="none" d="M45,950 L45,1035 L130,1035"/>
    <rect fill="#0a0a1e" x="41" y="1031" width="8" height="8"/>
    <!-- Inferior direito -->
    <path fill="none" d="M1875,950 L1875,1035 L1790,1035"/>
    <rect fill="#0a0a1e" x="1871" y="1031" width="8" height="8"/>
  </g>

</svg>
